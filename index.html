<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraceTools - AI Sermon Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script>
        // State Management
        const app = {
            currentPage: 'home',
            isLoggedIn: localStorage.getItem('isLoggedIn') === 'true',
            user: localStorage.getItem('user') ? JSON.parse(localStorage.getItem('user')) : { name: 'Pastor John', email: 'pastor@church.com', church: 'Grace Baptist', credits: 1250 },
            sermonState: {
                package: 'essentials',
                duration: 30,
                addons: [],
                inputType: 'passage',
                inputContent: '',
                translation: 'KJV',
                audience: 'Sunday Morning - Mixed',
                doctrinalPosition: 'Mid-Acts Dispensational',
                readingLevel: 'Standard',
                citationMode: 'Reference Only'
            },
            flash: null
        };

        const packagePrices = { essentials: 15, preacher: 35, master: 65 };
        const addonPrices = { 'Youth Version': 8, 'Small Group Guide': 10, 'Blog Article': 6, 'Social Posts': 5, 'Discussion Questions': 7, 'Printable': 5 };

        const inputTypes = [
            { key: 'passage', label: 'Bible Passage', placeholder: 'e.g. Romans 8:1-4' },
            { key: 'topic', label: 'Topic', placeholder: 'e.g. Walking in grace during suffering' },
            { key: 'notes', label: 'My Notes', placeholder: 'Paste your rough notes or outline here...' },
            { key: 'youtube', label: 'YouTube Link', placeholder: 'https://youtube.com/watch?v=...' }
        ];
        const translations = ['KJV', 'NASB', 'NKJV', 'ESV', 'NIV'];
        const audiences = ['Sunday Morning - Mixed', 'Youth Service', 'Small Group / Bible Study', 'Funeral / Memorial', 'Wedding', "Men's / Women's Ministry"];
        const doctrinalPositions = ['Mid-Acts Dispensational', 'Baptist', 'Reformed / Calvinist', 'Wesleyan / Arminian', 'Pentecostal / Charismatic', 'Non-Denominational / Evangelical'];
        const readingLevels = ['Simple / Accessible', 'Standard', 'Scholarly / Academic'];
        const citationModes = ['Reference Only', 'Full Verse Text'];
        const packageRecommendedDuration = { essentials: [15, 30], preacher: [30, 45, 60], master: [45, 60, 90] };
        const packageRecommendedAddons = {
            essentials: ['Discussion Questions', 'Printable'],
            preacher: ['Discussion Questions', 'Printable', 'Small Group Guide', 'Blog Article'],
            master: ['Youth Version', 'Small Group Guide', 'Blog Article', 'Social Posts', 'Discussion Questions', 'Printable']
        };

        // Set this once your AnythingLLM instance is deployed and white-labeled
        // (e.g. on Railway). Leave as null until then - the nav link will show
        // a friendly "coming soon" message instead of a broken link.
        const ANYTHINGLLM_URL = null; // e.g. 'https://sermon-library.gracetools.com'

        function openSermonLibrary() {
            if (!ANYTHINGLLM_URL) {
                setFlash('info', 'Sermon Library is being set up \u2014 check back soon!');
                render();
                return;
            }
            window.open(ANYTHINGLLM_URL, '_blank');
        }

        // Navigation
        function goTo(page) {
            app.currentPage = page;
            window.scrollTo(0, 0);
            render();
            if (page === 'dashboard' && app.isLoggedIn) {
                loadProjects();
            }
        }

        // Flash messages survive exactly one render (including through a goTo
        // that immediately follows setFlash), then clear themselves on the
        // next render so they don't linger across unrelated navigation.
        function setFlash(type, text) {
            app.flash = { type, text, shown: false };
        }

        // Every account, real or returning, is created/looked-up through this
        // one webhook, which upserts into the real Supabase users table and
        // always returns the canonical row (real id + real credits_balance).
        // This is what completeCheckout's credit deduction depends on.
        const CREATE_USER_WEBHOOK_URL = 'https://indefinable-teal.pikapod.net/webhook/0f43fdcb-2707-4796-9a7e-312f11e44f73/create-user';

        // Shared key required by every GraceTools webhook. Note: since this
        // ships in client-side JS, a determined attacker could still extract
        // it from the page source - this stops casual scraping/enumeration
        // but is not a substitute for real per-user session authentication.
        const GRACETOOLS_API_KEY = 'WtESSNN3F8YgGRLcwn0I3-UpOUFSgu_h97w2gJ-hLdU';

        function applyAccountFromServer(serverUser, fallbackName, fallbackChurch) {
            app.user = {
                name: serverUser.display_name || fallbackName || app.user.name,
                email: serverUser.email,
                church: serverUser.church_name || fallbackChurch || app.user.church,
                credits: typeof serverUser.credits_balance === 'number' ? serverUser.credits_balance : 0
            };
            app.isLoggedIn = true;
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('user', JSON.stringify(app.user));
            localStorage.setItem('userId', serverUser.id);
        }

        async function handleSignup() {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const church = document.getElementById('signup-church').value;
            // Note: this creates the real account record (name, email, church,
            // credits) in Supabase. It does not yet verify passwords against a
            // real auth provider - that still needs Supabase Auth wired in.
            try {
                const res = await fetch(CREATE_USER_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-GraceTools-Key': GRACETOOLS_API_KEY },
                    body: JSON.stringify({ user_id: ensureUserId(), email, name, church, starting_credits: 0 })
                });
                if (!res.ok) throw new Error('Server responded with ' + res.status);
                const data = await res.json();
                applyAccountFromServer(data.user, name, church);
                goTo('dashboard');
            } catch (err) {
                setFlash('error', "Couldn't create your account (" + err.message + "). Please try again.");
                render();
            }
        }

        async function handleLoginSubmit() {
            const email = document.getElementById('login-email').value;
            // Same real webhook, looked up by email. This restores your real
            // name, church, and credit balance from Supabase. It does not yet
            // verify the password field against a real auth provider.
            try {
                const res = await fetch(CREATE_USER_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-GraceTools-Key': GRACETOOLS_API_KEY },
                    body: JSON.stringify({ user_id: ensureUserId(), email })
                });
                if (!res.ok) throw new Error('Server responded with ' + res.status);
                const data = await res.json();
                applyAccountFromServer(data.user, app.user.name, app.user.church);
                goTo('dashboard');
            } catch (err) {
                setFlash('error', "Couldn't sign you in (" + err.message + "). Please try again.");
                render();
            }
        }

        function handleLogout() {
            app.isLoggedIn = false;
            localStorage.removeItem('isLoggedIn');
            goTo('home');
        }

        function getSermonTotal() {
            let total = packagePrices[app.sermonState.package];
            app.sermonState.addons.forEach(addon => { total += addonPrices[addon] || 0; });
            return total;
        }

        function fillExample() {
            app.sermonState.inputType = 'passage';
            app.sermonState.inputContent = 'Romans 8:1-4';
            render();
        }

        function updateInputContent(value) {
            app.sermonState.inputContent = value.slice(0, 5000);
            const counter = document.getElementById('input-char-count');
            if (counter) counter.textContent = app.sermonState.inputContent.length + '/5000';
        }

        // This is the ONLY place user_email is read from for sermon delivery -
        // always the account's email (set at signup, editable on Account page),
        // never anything typed elsewhere. This guarantees the finished sermon
        // is always emailed to whatever address the customer has on file.
        const SERMON_WEBHOOK_URL = 'https://indefinable-teal.pikapod.net/webhook/gracetools-sermon-gen/generate-sermon';

        function ensureUserId() {
            let id = localStorage.getItem('userId');
            if (!id) {
                id = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : ('temp-' + Date.now());
                localStorage.setItem('userId', id);
            }
            return id;
        }

        async function completeCheckout() {
            const total = getSermonTotal();
            if (app.user.credits < total) {
                setFlash('error', "You don't have enough credits for this package. Buy more credits to continue.");
                render();
                return;
            }

            const destinationEmail = app.user.email; // account email, explicitly

            const payload = {
                user_id: ensureUserId(),
                user_email: destinationEmail,
                project_id: (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : ('proj-' + Date.now()),
                input_type: app.sermonState.inputType,
                input_content: app.sermonState.inputContent || 'Romans 8:1-4',
                base_package: app.sermonState.package,
                credits_cost: total,
                doctrinal_position: app.sermonState.doctrinalPosition,
                bible_translation: app.sermonState.translation,
                audience: app.sermonState.audience,
                sermon_style: 'Expository (Verse-by-Verse)',
                desired_length: app.sermonState.duration,
                reading_level: app.sermonState.readingLevel,
                citation_mode: app.sermonState.citationMode,
                addons: app.sermonState.addons
            };

            setFlash('info', 'Submitting your sermon \u2014 it will be generated and emailed to ' + destinationEmail + '. This usually takes 30-90 seconds.');
            render();

            try {
                const res = await fetch(SERMON_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-GraceTools-Key': GRACETOOLS_API_KEY },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) {
                    const errText = await res.text().catch(() => '');
                    throw new Error('Server responded with ' + res.status + (errText ? ': ' + errText.slice(0, 200) : ''));
                }
                app.user.credits -= total;
                localStorage.setItem('user', JSON.stringify(app.user));
                setFlash('success', 'Your sermon is generating now and will be emailed to ' + destinationEmail + ' shortly.');
            } catch (err) {
                setFlash('error', "Your sermon couldn't be submitted (" + err.message + "). Your credits were NOT charged \u2014 please try again or contact support@gracetools.com.");
            }
            goTo('dashboard');
        }

        function saveAccount() {
            const name = document.getElementById('acct-name').value;
            const email = document.getElementById('acct-email').value;
            const church = document.getElementById('acct-church').value;
            app.user.name = name;
            app.user.email = email;
            app.user.church = church;
            localStorage.setItem('user', JSON.stringify(app.user));
            setFlash('success', 'Your account changes were saved.');
            goTo('account');
        }

        function buyCredits(credits) {
            setFlash('info', 'Live payments aren\'t connected yet, so this is a placeholder \u2014 buying ' + credits + ' credits will work once Stripe billing goes live.');
            render();
        }

        function sendPasswordReset() {
            const email = document.getElementById('reset-email') ? document.getElementById('reset-email').value : '';
            setFlash('success', email ? ("If an account exists for " + email + ", reset instructions are on the way.") : 'Enter your email above and we\'ll send reset instructions.');
            render();
        }

        const LIST_PROJECTS_WEBHOOK_URL = 'https://indefinable-teal.pikapod.net/webhook/6fe57b4e-bb9f-4049-b6b8-ceb56cad70e0/list-projects';

        // Real project data, replacing the old hardcoded mockProjects.
        // null = not yet loaded, [] = loaded but empty, [...] = loaded with data
        app.projects = null;
        app.viewingProject = null;
        let pollTimer = null;

        async function loadProjects() {
            try {
                const res = await fetch(LIST_PROJECTS_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-GraceTools-Key': GRACETOOLS_API_KEY },
                    body: JSON.stringify({ user_id: ensureUserId() })
                });
                if (!res.ok) throw new Error('Server responded with ' + res.status);
                const data = await res.json();
                app.projects = data.projects || [];
            } catch (err) {
                app.projects = [];
                setFlash('error', "Couldn't load your projects (" + err.message + ").");
            }
            render();
            manageProjectPolling();
        }

        // While any project is still generating, quietly refresh every 10s
        // so the dashboard updates without a manual reload.
        function manageProjectPolling() {
            const hasGenerating = (app.projects || []).some(p => p.status === 'generating' || p.status === 'pending');
            if (hasGenerating && !pollTimer) {
                pollTimer = setInterval(loadProjects, 10000);
            } else if (!hasGenerating && pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        function viewProject(id) {
            const p = (app.projects || []).find(pr => pr.id === id);
            if (!p) return;
            if (p.status === 'ready') {
                app.viewingProject = p;
                goTo('sermon-viewer');
            } else if (p.status === 'failed') {
                setFlash('error', (p.title ? '"' + p.title + '"' : 'This sermon') + ' failed to generate: ' + (p.error_message || 'unknown error') + '. Your credits were automatically refunded.');
                render();
            } else {
                setFlash('info', 'Still generating' + (p.title ? ' "' + p.title + '"' : '') + '. This page checks automatically \u2014 no need to refresh.');
                render();
            }
        }

        // Flash banner, shown at the top of page content when set
        function FlashBanner() {
            if (!app.flash) return '';
            if (app.flash.shown) {
                app.flash = null;
                return '';
            }
            app.flash.shown = true;
            const styles = {
                success: 'bg-green-50 border-green-200 text-green-800',
                error: 'bg-red-50 border-red-200 text-red-800',
                info: 'bg-purple-50 border-purple-200 text-purple-800'
            };
            const style = styles[app.flash.type] || styles.info;
            return `
                <div class="max-w-6xl mx-auto px-4 pt-4">
                    <div class="border rounded-lg px-4 py-3 text-sm ${style}">${app.flash.text}</div>
                </div>
            `;
        }

        // Header Component
        function Header() {
            return `
                <header class="fixed top-0 left-0 right-0 bg-white border-b border-gray-200 z-40">
                    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                        <div onclick="goTo('home')" class="text-xl font-bold text-gray-900 cursor-pointer">✚ GraceTools</div>
                        
                        <nav class="hidden md:flex items-center gap-8">
                            ${app.isLoggedIn ? `
                                <button type="button" onclick="goTo('dashboard')" class="text-sm text-gray-600 hover:text-gray-900 cursor-pointer bg-transparent border-0 p-0 inline align-baseline">Dashboard</button>
                                <button type="button" onclick="openSermonLibrary()" class="text-sm text-gray-600 hover:text-gray-900 cursor-pointer bg-transparent border-0 p-0 inline align-baseline">Sermon Library</button>
                                <button type="button" onclick="goTo('how-it-works')" class="text-sm text-gray-600 hover:text-gray-900 cursor-pointer bg-transparent border-0 p-0 inline align-baseline">How It Works</button>
                                <button type="button" onclick="goTo('support')" class="text-sm text-gray-600 hover:text-gray-900 cursor-pointer bg-transparent border-0 p-0 inline align-baseline">Support</button>
                            ` : `
                                <button type="button" onclick="goTo('how-it-works')" class="text-sm text-gray-600 hover:text-gray-900 cursor-pointer bg-transparent border-0 p-0 inline align-baseline">How It Works</button>
                                <button type="button" onclick="goTo('pricing')" class="text-sm text-gray-600 hover:text-gray-900 cursor-pointer bg-transparent border-0 p-0 inline align-baseline">Pricing</button>
                                <button type="button" onclick="goTo('about')" class="text-sm text-gray-600 hover:text-gray-900 cursor-pointer bg-transparent border-0 p-0 inline align-baseline">About</button>
                            `}
                        </nav>

                        <div class="flex items-center gap-4">
                            ${app.isLoggedIn ? `
                                <span class="text-sm text-gray-600 hidden sm:inline">${app.user.name}</span>
                                <button onclick="goTo('account')" class="text-sm text-gray-600 hover:text-gray-900">Account</button>
                                <button onclick="handleLogout()" class="text-sm text-gray-600 hover:text-gray-900">Logout</button>
                            ` : `
                                <button onclick="goTo('login')" class="hidden sm:inline text-sm text-gray-600 hover:text-gray-900">Login</button>
                                <button onclick="goTo('signup')" class="bg-purple-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-purple-700">Sign Up</button>
                            `}
                        </div>
                    </div>
                </header>
            `;
        }

        // Pages
        function HomePage() {
            return `
                <div class="pt-16">
                    <section class="bg-white px-6 py-16">
                        <div class="max-w-3xl mx-auto text-center">
                            <h1 class="text-5xl font-bold text-gray-900 mb-4">Sermon Prep Made Simple</h1>
                            <p class="text-xl text-gray-600 mb-8">Get your Sunday sermon tools in minutes, so you can get back to people.</p>
                            <button onclick="goTo('${app.isLoggedIn ? 'builder' : 'signup'}')" class="bg-purple-600 text-white px-8 py-3 rounded-lg text-lg font-semibold hover:bg-purple-700">Start a Sermon</button>
                        </div>
                    </section>

                    <section class="bg-gray-50 px-6 py-16">
                        <div class="max-w-2xl mx-auto">
                            <h2 class="text-3xl font-bold text-gray-900 mb-4">The Challenge Pastors Face</h2>
                            <p class="text-gray-600 mb-4">Every week brings the same pressure: sermon deadlines, hospital visits, counseling, administration. You need solid biblical research, creative outlines, slides, and discussion guides—but you need them fast.</p>
                            <p class="text-gray-600">GraceTools takes your starting point—a Bible passage, a topic, your notes, or even a YouTube link—and generates complete sermon packages in your theological framework.</p>
                            
                            <div class="grid md:grid-cols-3 gap-4 mt-8">
                                <div class="bg-white p-6 rounded-2xl border border-gray-200">
                                    <div class="text-2xl mb-2">⚡</div>
                                    <h3 class="font-semibold text-gray-900 mb-2">Fast</h3>
                                    <p class="text-sm text-gray-600">Ready in 5-10 minutes</p>
                                </div>
                                <div class="bg-white p-6 rounded-2xl border border-gray-200">
                                    <div class="text-2xl mb-2">✓</div>
                                    <h3 class="font-semibold text-gray-900 mb-2">Doctrine-Aware</h3>
                                    <p class="text-sm text-gray-600">Respects your theology</p>
                                </div>
                                <div class="bg-white p-6 rounded-2xl border border-gray-200">
                                    <div class="text-2xl mb-2">💰</div>
                                    <h3 class="font-semibold text-gray-900 mb-2">Affordable</h3>
                                    <p class="text-sm text-gray-600">Pay only what you use</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="bg-white px-6 py-16 text-center">
                        <h2 class="text-2xl font-bold text-gray-900 mb-4">Ready to transform your sermon prep?</h2>
                        <button onclick="goTo('${app.isLoggedIn ? 'builder' : 'signup'}')" class="bg-purple-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-purple-700">Start a Sermon</button>
                    </section>
                </div>
            `;
        }

        function SignupPage() {
            return `
                <div class="pt-20 min-h-screen bg-gray-50 px-4 py-8">
                    <div class="max-w-md mx-auto bg-white rounded-2xl border border-gray-200 p-8">
                        <h1 class="text-2xl font-bold text-gray-900 mb-2">Create Account</h1>
                        <p class="text-gray-600 mb-6 text-sm">Join GraceTools and start building sermons today</p>
                        
                        <form onsubmit="handleSignup(); return false;">
                            <div class="mb-4">
                                <label for="signup-name" class="block text-sm font-semibold text-gray-900 mb-2">Full Name</label>
                                <input id="signup-name" required type="text" placeholder="Pastor John Smith" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-600" />
                            </div>
                            <div class="mb-4">
                                <label for="signup-email" class="block text-sm font-semibold text-gray-900 mb-2">Email</label>
                                <input id="signup-email" required type="email" placeholder="you@church.com" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-600" />
                            </div>
                            <div class="mb-4">
                                <label for="signup-church" class="block text-sm font-semibold text-gray-900 mb-2">Church Name</label>
                                <input id="signup-church" type="text" placeholder="Grace Baptist Church" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-600" />
                            </div>
                            <div class="mb-6">
                                <label for="signup-password" class="block text-sm font-semibold text-gray-900 mb-2">Password</label>
                                <input id="signup-password" required minlength="8" type="password" placeholder="••••••••" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-600" />
                                <p class="text-xs text-gray-500 mt-1">At least 8 characters</p>
                            </div>
                            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg font-semibold hover:bg-purple-700 mb-4">Create Account</button>
                        </form>
                        <p class="text-center text-gray-600 text-sm">Already have an account? <button type="button" onclick="goTo('login')" class="text-purple-600 hover:underline font-semibold cursor-pointer bg-transparent border-0 p-0 inline align-baseline">Login</button></p>
                    </div>
                </div>
            `;
        }

        function LoginPage() {
            return `
                <div class="pt-20 min-h-screen bg-gray-50 px-4 py-8">
                    <div class="max-w-md mx-auto bg-white rounded-2xl border border-gray-200 p-8">
                        <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome Back</h1>
                        <p class="text-gray-600 mb-6 text-sm">Sign in to your GraceTools account</p>
                        
                        <form onsubmit="handleLoginSubmit(); return false;">
                            <div class="mb-4">
                                <label for="login-email" class="block text-sm font-semibold text-gray-900 mb-2">Email</label>
                                <input id="login-email" required type="email" placeholder="you@church.com" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-600" />
                            </div>
                            <div class="mb-6">
                                <label for="login-password" class="block text-sm font-semibold text-gray-900 mb-2">Password</label>
                                <input id="login-password" required type="password" placeholder="••••••••" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-600" />
                            </div>
                            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg font-semibold hover:bg-purple-700 mb-4">Sign In</button>
                        </form>
                        <p class="text-center text-gray-600 text-sm mb-4">
                            <button type="button" onclick="goTo('forgot-password')" class="text-purple-600 hover:underline cursor-pointer bg-transparent border-0 p-0 inline align-baseline">Forgot your password?</button>
                        </p>
                        <div class="border-t pt-4">
                            <p class="text-center text-gray-600 text-sm">Don't have an account? <button type="button" onclick="goTo('signup')" class="text-purple-600 hover:underline font-semibold cursor-pointer bg-transparent border-0 p-0 inline align-baseline">Sign up</button></p>
                        </div>
                    </div>
                </div>
            `;
        }

        function ForgotPasswordPage() {
            return `
                <div class="pt-20 min-h-screen bg-gray-50 px-4 py-8">
                    <div class="max-w-md mx-auto bg-white rounded-2xl border border-gray-200 p-8">
                        <h1 class="text-2xl font-bold text-gray-900 mb-2">Reset Your Password</h1>
                        <p class="text-gray-600 mb-6 text-sm">Enter your email and we'll send you reset instructions.</p>
                        <div class="mb-6">
